name: Release

on:
  push:
    tags:
      - "v*"
    branches:
      - main
    paths-ignore:
      - "**.md"

permissions:
  contents: write

env:
  GHC_VERSION: "9.12.2"
  CABAL_VERSION: "3.16.1.0"

jobs:
  matrix-setup:
    name: Setup matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: set
        run: .github/matrix.sh

  build:
    needs: matrix-setup
    strategy:
      matrix: ${{ fromJSON(needs.matrix-setup.outputs.matrix) }}

    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Haskell
        id: ghcup
        uses: haskell/ghcup-setup@v1
        with:
          ghc: ${{ env.GHC_VERSION }}
          cabal: ${{ env.CABAL_VERSION }}

      - name: Cache cabal store and dist-newstyle
        uses: actions/cache@v5
        with:
          path: |
            ~/.cabal/store
            ~/.local/state/cabal/store
            dist-newstyle
          key: ${{ matrix.name }}-${{ env.GHC_VERSION }}-${{ hashFiles('localmost.cabal') }}
          restore-keys: ${{ matrix.name }}-${{ env.GHC_VERSION }}-

      - name: Update cabal index
        run: cabal update

      - name: Test
        run: cabal test -j -f -dev

      - name: Build
        if: startsWith(github.ref, 'refs/tags/')
        run: cabal build -j -f -dev ${{ matrix.static == true && '--enable-executable-static' || '' }} --ghc-options='-split-sections'

      - name: Prepare binary
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          bin=$(cabal list-bin localmost)
          strip "$bin"
          cp "$bin" localmost
          tar czf localmost-${{ matrix.name }}.tar.gz localmost

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v6
        with:
          name: localmost-${{ matrix.name }}.tar.gz
          path: localmost-${{ matrix.name }}.tar.gz

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [matrix-setup, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release and upload binaries
        run: gh release create "${{ github.ref_name }}" artifacts/* --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
